site_name: Swiftcam Documentation
site_description: Swiftcam push notification docs and Swiftcam server install notes
site_url: https://swiftcam.app/docs

docs_dir: ./docs
site_dir: ./site/docs

theme:
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme)"
      scheme: default     
      toggle:
        icon: lucide/sun-moon
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default 
      toggle:
        icon: lucide/sun
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: lucide/moon
        name: Switch to system preference
    
  language: en
  favicon: images/favicon.png
  logo: images/favicon.png
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight:
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Getting started:
    - Backend configuration: backend-configuration.md
    - App configuration: server-configuration.md
    - Adding cameras: adding-cameras.md
  - Push Notifications: push-notifications.md

  - Advanced configuration:
    - Swiftcam Server: swiftcam-server.md
    - Multi server: multi-server.md
    - Advanced camera settings: advanced-camera-settings.md

  - Legal:
    - Privacy policy: privacy.md
    - Imprint: imprint.md
